name: x-growth-kpi-update

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update KPI CSV
        env:
          X_OAUTH_CONSUMER_KEY: ${{ secrets.X_OAUTH_CONSUMER_KEY }}
          X_OAUTH_CONSUMER_SECRET: ${{ secrets.X_OAUTH_CONSUMER_SECRET }}
          X_OAUTH_ACCESS_TOKEN: ${{ secrets.X_OAUTH_ACCESS_TOKEN }}
          X_OAUTH_ACCESS_TOKEN_SECRET: ${{ secrets.X_OAUTH_ACCESS_TOKEN_SECRET }}
        run: python -m x_growth.kpi_updater

      - name: Commit updated kpi.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/x-growth/kpi.csv
          git diff --cached --quiet || git commit -m "chore: auto-update kpi.csv [skip ci]"
          git push
